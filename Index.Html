<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haider Group of Companies - Portal</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* Fly-in Animation */
        @keyframes flyIn {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
            margin-top: 50px;
            animation: flyIn 0.8s ease-out;
            display: none; /* Hidden by default */
        }

        .active { display: block; }

        h2 { text-align: center; color: var(--primary-color); }
        
        .footer-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { background: #2980b9; }
        .btn-admin { background: var(--primary-color); }
        .btn-delete { background: var(--accent-color); margin-top: 5px; padding: 5px;}

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.8em;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .back-btn {
            background: none;
            color: var(--primary-color);
            text-decoration: underline;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        .attendance-btns button {
            width: auto;
            padding: 5px;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="portal-choice" class="container active">
        <h2>HAIDER GROUP OF COMPANIES</h2>
        <p style="text-align:center">Select Your Portal</p>
        <button onclick="showSection('reg-form')">Employee Registration</button>
        <button class="btn-admin" onclick="showSection('admin-login')">Admin Login</button>
    </div>

    <div id="reg-form" class="container">
        <h2>Employee Registration</h2>
        <form id="employeeForm">
            <input type="text" id="empName" placeholder="Full Name" required>
            <input type="email" id="empEmail" placeholder="Email Address" required>
            <input type="text" id="empRole" placeholder="Job Designation (e.g. Developer)" required>
            <select id="empShift">
                <option value="Day">Day Shift</option>
                <option value="Night">Night Shift</option>
            </select>
            <button type="submit">Register Now</button>
        </form>
        <button class="back-btn" onclick="showSection('portal-choice')">← Back to Home</button>
    </div>

    <div id="admin-login" class="container">
        <h2>Admin Access</h2>
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="loginAdmin()">Login</button>
        <button class="back-btn" onclick="showSection('portal-choice')">← Back</button>
    </div>

    <div id="admin-dashboard" class="container" style="max-width: 800px;">
        <h2>Admin Dashboard (CEO Mode)</h2>
        <div style="overflow-x:auto;">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Attendance (M T W T F S)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
        <button class="back-btn" onclick="showSection('portal-choice')">← Logout Admin</button>
    </div>

    <div class="footer-info">
        <p><strong>CEO: Hasnain Haider</strong></p>
        <p>Haider Group of Companies | Ph: 03014464374</p>
    </div>

    <script>
        // Data Management
        let employees = JSON.parse(localStorage.getItem('employees')) || [];

        function showSection(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'admin-dashboard') loadEmployeeTable();
        }

        // Admin Login Logic
        function loginAdmin() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            
            // Per your request: user 1234, pass 1234
            if(user === "1234" && pass === "1234") {
                showSection('admin-dashboard');
            } else {
                alert("Invalid Admin Credentials");
            }
        }

        // Handle Registration
        document.getElementById('employeeForm').onsubmit = function(e) {
            e.preventDefault();
            const newEmp = {
                id: Date.now(),
                name: document.getElementById('empName').value,
                email: document.getElementById('empEmail').value,
                role: document.getElementById('empRole').value,
                attendance: { mon: '❌', tue: '❌', wed: '❌', thu: '❌', fri: '❌', sat: '❌' }
            };
            employees.push(newEmp);
            localStorage.setItem('employees', JSON.stringify(employees));
            alert("Registration Successful!");
            this.reset();
            showSection('portal-choice');
        };

        // Load Table for Admin
        function loadEmployeeTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            employees.forEach((emp, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${emp.name}</td>
                        <td>${emp.role}</td>
                        <td class="attendance-btns">
                            <button onclick="toggleAtt(${index}, 'mon')">${emp.attendance.mon}</button>
                            <button onclick="toggleAtt(${index}, 'tue')">${emp.attendance.tue}</button>
                            <button onclick="toggleAtt(${index}, 'wed')">${emp.attendance.wed}</button>
                            <button onclick="toggleAtt(${index}, 'thu')">${emp.attendance.thu}</button>
                            <button onclick="toggleAtt(${index}, 'fri')">${emp.attendance.fri}</button>
                            <button onclick="toggleAtt(${index}, 'sat')">${emp.attendance.sat}</button>
                        </td>
                        <td>
                            <button class="btn-delete" onclick="deleteEmp(${index})">Remove</button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleAtt(index, day) {
            employees[index].attendance[day] = employees[index].attendance[day] === '✅' ? '❌' : '✅';
            localStorage.setItem('employees', JSON.stringify(employees));
            loadEmployeeTable();
        }

        function deleteEmp(index) {
            if(confirm("Are you sure you want to remove this employee?")) {
                employees.splice(index, 1);
                localStorage.setItem('employees', JSON.stringify(employees));
                loadEmployeeTable();
            }
        }
    </script>
</body>
</html>
